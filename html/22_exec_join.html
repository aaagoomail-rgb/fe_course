<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
</head>
<body>
    <h1>회원가입</h1>
    <form action="#" method="get">
        <ul>
            <li>
                <div>필수항목</div>
            </li>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id">
            </li>
            <li>
                <label for="pwd">비밀번호</label>
                <input type="password" name="pwd">
            </li>
            <li>
                <label for="em">이메일</label>
                <input type="email" name="em" placeholder="example@example.com">
            </li>
            <li>
                <label for="name">성명</label>
                <input type="text" name="name">
            </li>
            <li>
                <label for="age">나이</label>
                <input type="text" name="age">
            </li>
            <li>
                <div>당신에 대해서 알고 싶어요!</div>
            </li>
            <li>
                <label for="hobby">취밀를 선택해주세요.</label>
                <input type="radio" name="hobby" value="game"><span>게임하기</span>
                <!-- div 속성을 사용해도 되지만, div는 block 속성이기 때문에 훨씬 접근성 좋은 span 속성을 사용해 준다. -->
                <input type="radio" name="hobby" value="music"><span>음악듣기</span>
                <input type="radio" name="hobby" value="icedrink"><span>아이스음료 마시기</span>
                <!-- value 옵션값을 지정해 주지 않아도 컨텐츠가 알아서 넘어가기는 하지만, value값을 명시적으로 지정 해 주는것이 좋다. -->
            </li>
            <li>
                <label for="sel_dr">좋아하는 음료를 선택해주세요(중복선택가능)</label>
                <input type="checkbox" name="sel_dr" value="shake"><span>쉐이크 종류 음료</span>
                <input type="checkbox" name="sel_dr" value="tea"><span>티 종류 음료</span>
                <input type="checkbox" name="sel_dr" value="coffee"><span>커피 종류 음료</span>
            </li>
            <li>
                <label for="date">동아리 참석 가능 날짜:</label>
                <input type="date">
            </li>
            <li>
                <label for="group">참여하고 싶은 모임은?</label>
                <select name="group" id="group">
                    <option value="">선택해주세요</option>
                    <option value="">게임 모임</option>
                    <option value="">음악감상 모임</option>
                    <option value="">러닝 모임</option>
                </select>
            </li>
            <li>
                <label for="portfolio">포트폴리오 제출</label>
                <button type="button">포트폴리오 업로드</button>
                <input type="file" name="portfolio" id="portfolio">
            </li>
            <li>
                <label for="intro">마지막으로 하고 싶은 말은?</label>
                <textarea name="intro" id="intro" placeholder="50자 이내로 작성해주세요." cols="50" rows="10"></textarea>
            </li>
            <li>
                <button type="reset">다시하기</button>
                <button type="submit">전송하기</button>
            </li>
        </ul>
    </form>
</body>
</html>
