<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic</title>
</head>
<body>
    <!-- Header -->
    <header>
        <div id="header_top">
            <img src="../images/img01.png" width="50px" alt="LOGO">
            <nav id="header_top_menu">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Sign in</a></li>
                    <li><a href="#">Sign up</a></li>
                    <li><a href="#">Notice</a></li>
                    <li><a href="#">Bulletin Board</a></li>
                </ul>
                <!-- 여기서 nav > ul > a 태그로 이어지는 트리 형태가 가장 정형적인 사이트 메뉴 구현 형태 -->
            </nav>
        </div>
        <div id="header_bottom">Header Bottom</div>
    </header>
    
    <!-- Content -->
    <main>
        <section>Sub Menu</section>
        <section>Content</section>
    </main>

    <!-- Footer -->
    <footer>
        <p>Copyright</p>
        <nav id="footer_menu"></nav>
        <ul>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Terms of Service</a></li>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Recruitment Information</a></li>
        </ul>
    </footer>
</body>
</html>
<!-- html5 부터 시멘틱 태그가 생겼으며 위에 예시로 든 태그들이 그 예. header, main, footer-->
