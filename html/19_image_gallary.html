<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallary</title>
    <style>
        ul {
            /* property: value;S */
            list-style-type: none;
            display: flex;
            gap: 10px;
        }
        li, article, figure, figcaption {
            border: 1px solid grey;
        }
        img {
            width: 300px;
        }
        div {
            text-align: center;
            padding: 20px;
            /* padding-bottom: 40px; */
        }
        figcaption {
            text-align: center;
        }
        /* article {
            border: 1px solid gray;
        } */
        section {
            display: flex;
        }
        article {
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Image Gallary : List </h1>
    <ul>
        <li>
            <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="1">
            <div>CInque Terre</div>
        </li>
        <li>
            <img src="https://www.w3schools.com/css/img_forest.jpg" alt="2">
            <div>Green Forest</div>
        </li>
        <li>
            <img src="https://www.w3schools.com/css/img_lights.jpg" alt="3">
            <div>Northern Light</div>
        </li>
        <li>
            <img src="https://www.w3schools.com/css/img_mountains.jpg" alt="4">
            <div>Mountains</div>
        </li>
    </ul>
    <hr>
    <h1>Image Gallary : Semantic</h1>
    <section>
        <article>
            <figure>
                <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="1">
                <figcaption>
                    <p>CInque Terra</p>
                </figcaption>
            </figure>
        </article>
        <article>
            <figure>
                <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="1">
                <figcaption>
                    <p>CInque Terra</p>
                </figcaption>
            </figure>
        </article>
    </section>
</body>
</html>
