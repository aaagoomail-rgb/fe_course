<!-- 해당코드는 첫 번째 심화실습 이었던 test1.html코드에 대한 해설내용. test1과 비교 해 볼 것. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 개발 교육 상담 문의_해설판</title>
    <!-- 조건 : 검색엔진에 최적화 = 시멘틱 태그 사용 -->
</head>
<body>
    <main>
        <section>
            <h1>웹 개발 교육 상담 문의_해설판</h1>
            <p>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해드립니다.</p>
            <form action="#" method="get"> <!-- 실무에서의 경우 post 사용 -->
                <fieldset>
                    <legend>상담 신청 정보</legend>
                    <article>
                        <label for="name">이름<sup>*</sup></label>
                        <!-- 참고로 * 표시는 반드시 표기해야 되는 사항을 시각적으로 나타내는 용도. sup 태그를 사용하여 구분해 주는것은 센스. -->
                        <input type="text" name="name" placeholder="이름을 입력하세요">
                        <p>실명을 입력해 주세요.</p>
                    </article>
                    <!-- div 역시 사용 가능 -->
                    <div>
                        <label for="email">이메일<sup>*</sup></label>
                        <input type="email" name="email" placeholder="example@gmail.com">
                        <p>답변을 받을 이메일 주소를 입력해 주세요.</p>
                    </div>
                    <div>
                        <label for="tel">연락처 </label>
                        <input type="tel" name="tel" placeholder="010-0000-0000">
                    </div>
                    <div>
                        <label for="sl">관심 과정<sup>*</sup></label>
                        <select name="sl">
                            <option value="sel">선택하세요</option>
                            <option value="bigdata">빅데이터</option>
                            <option value="ai">AI</option>
                        </select>
                    </div>
                    <div>
                        <label for="intro">문의 내용<sup>*</sup></label>
                        <textarea name="intro" placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
                        <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                    </div>
                    <div>
                        <input type="checkbox" name="ck">
                        <label for="ck">개인정보 수집 및 이용에 동의합니다. <sup>*</sup></label>
                    </div>
                    <div>
                        <button type="submit">상담 문의 보내기</button>
                    </div>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
