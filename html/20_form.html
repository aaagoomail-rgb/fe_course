<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Form</title>
</head>
<body>
    <h1>Sign up</h1>
    <a href="#field2">기타항목 입력</a>
    <form action="#" method="get">
        <!-- form action 속성은 백엔드 서버 주소를 사용한다. # 은 일반적으로 자기 자신을 의미한다. -->
        <!-- get : 서버에 데이터 전송 방식으로 URL을 사용한다. Query String -->
        <!-- post : 서버에 데이터 전송 시 네트웍 패킷의 바디에 함께 전송한다. -->
        <fieldset>
            <legend>개인 정보 입력</legend>
            <ul>
                <li>
                    <label for="id">ID : </label>
                    <input type="text" name="id">
                </li>
                <li>
                    <label for="password">PASSWORD : </label>
                    <input type="password" name="password">
                </li>
                <fieldset>
                    <legend>주소 선택 태그</legend>
                    <li>
                        <label for="address">Enter Address </label>
                        <input type="text" name="" id="address">
                    </li>
                    <li>
                        <label for="s_address">Select Address</label>
                        <input type="radio" name="s_address" value="seoul"><span>서울시</span>
                        <input type="radio" name="s_address" value="incheon"><span>인천시</span>
                        <input type="radio" name="s_address" value="busan"><span>부산시</span>
                        <!-- radio 옵션은 name 값 통일. -->
                    </li>
                    <li>
                        <label for="c_address">Check Address</label>
                        <input type="checkbox" name="c_address" value="seoul"><span>서울시</span>
                        <input type="checkbox" name="c_address" value="incheon"><span>인천시</span>
                        <input type="checkbox" name="c_address" value="busan"><span>부산시</span>
                        <!-- checkbox 옵션은 같은 이름이어도 중복선택 가능. -->
                    </li>
                    <li>
                        <label for="sl_address">Select to Address</label>
                        <select name="sl_address" id="">
                            <option value="select">Please Select</option>
                            <option value="seoul">seoul</option>
                            <option value="incheon">incheon</option>
                            <option value="busan">busan</option>
                        </select>
                    </li>
                </fieldset>
                <li>
                    <label for="birth">Select Birth</label>
                    <input type="date" name="birth">
                </li>
                <li>
                    <label for="photo">Profile Photo</label>
                    <input type="file" name="photo">
                </li>
                <li>
                    <label for="intro">Intro</label>
                    <textarea name="intro" cols="50" rows="10" placeholder="100자 이내로 작성 해 주세요."></textarea>
                    <!-- textarea 태그는 공백없이 작성 할 것. <t..>   </t..> 이렇게 공백있으면 해당 공백까지 출력에 반영됨. -->
                </li>
                <li>
                    <button>Transfort</button>
                    <!-- button type 속성 명시값 없을 경우 default = submit. submit은 버튼액션시 무조건 action에 할당된 주소로 이동한다. -->
                    <button type="button">Transfort(모양만 버튼, 이벤트X)</button>
                    <button type="reset">Transfort(다시쓰기)</button>
                </li>
            </ul>
        </fieldset>
        <fieldset id="field2">
            <legend>기타 항목 입력</legend>
        </fieldset>
    </form>
</body>
</html>
