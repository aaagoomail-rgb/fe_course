<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 개발 교육 상담 문의</title>
    <!-- 조건 : 검색엔진에 최적화 = 시멘틱 태그 사용 -->
</head>
<body>
    <h1>웹 개발 교육 상담 문의</h1>
    <p>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해드립니다.</p>
    <main>
        <form action="#" method="get">
            <fieldset>
                <legend>상담 신청 정보</legend>
                <div>
                    <label for="name">이름 * </label>
                    <input type="text" name="name" placeholder="이름을 입력하세요">
                </div>
                <div>
                    <p>실명을 입력해 주세요.</p>
                </div>
                <div>
                    <label for="email">이메일 * </label>
                    <input type="email" name="email" placeholder="example@gmail.com">
                </div>
                <div>
                    <p>답변을 받을 이메일 주소를 입력해 주세요.</p>
                </div>
                <div>
                    <label for="tel">연락처 </label>
                    <input type="tel" name="tel" placeholder="010-0000-0000"> <br>
                    <label for="sl">관심 과정 * </label>
                    <select name="sl" id="">
                        <option value="sel">선택하세요</option>
                        <option value="bigdata">빅데이터</option>
                        <option value="ai">AI</option>
                    </select>
                </div>
                <div>
                    <label for="intro">문의 내용 * </label>
                    <textarea name="intro" id="" placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
                </div>
                <div>
                    <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                </div>
                <div>
                    <label for="ck"></label>
                    <input type="checkbox" name="ck" value="ok"><span> 개인정보 수집 및 이용에 동의합니다. *</span> <br>
                    <button type="submit">상담 문의 보내기</button>
                </div>
            </fieldset>
        </form>
    </main>
</body>
</html>
