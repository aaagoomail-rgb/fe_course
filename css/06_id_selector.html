<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <meta name="description" content="ID Selector">
    <style>
        * {
            margin: 0;
        }
        #one {
            color: tomato;
            width: 300px;
            height: 100px;
            background-color: green;
        }
        #tw {
            color: tomato;
            width: 300px;
            height: 100px;
            background-color: greenyellow;
        }
        #thr {
            color: dodgerblue;
            width: 300px;
            height: 100px;
            background-color: lemonchiffon;
        }
    </style>
</head>
<body>
    <h1 id="one">ID Selector #1</h1>
    <h1 id="tw">ID Selector #2</h1>
    <h1 id="thr">ID Selector #3</h1>
    <!-- id 값으로 지정할 때에는 가장 값에 정수값을 사용하는것은 권장하지 않는다.
    id는 중복해서 사용하지 않는다. 중복이 필요한 경우 class 를 이용할 것. -->
</body>
</html>
