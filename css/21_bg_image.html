<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image</title>
    <style>
        body {
            width: 500px;
            height: 500px;
            background-image: url("../images/pattern1.png");
            /* background image 를 사용하게 되면 좀 더 효율적이다. */
            background-repeat: no-repeat; /*default 값 = repeat*/
            border: 1px solid red;
            /* background image url 과 repeat 속성 잘 알고있기. */
        }
        img {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>Background Image</h1>
    <div></div>
    <!-- <img src="../images/pattern1.jpg" alt="pt1"> -->
    <img src="../images/pattern2.png" alt="pt2">
</body>
</html>
