<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background-Position</title>
    <style>
        .bg {
            border: 1px solid red;
            width: 100%; /* 크기 조절은 % 하는게 간편하다. */
            height: 300px;
            background-image: url('../images/pattern2.jpg');
            background-repeat: no-repeat;
            background-position: 50% 50%; /* 백그라운드 정 가운데 설정 값. */
            background-size: auto; /* cover 많이 사용함. 가로, 세로 크기만큼 확대하여 맞춤 */
        }
        .star-bg {
            width: 100%;
            /* height: 620px; */
            height: 32.3vw; /* viewport : vm = (이미지 출력 높이() / vw너비(가로해상도)) * 100 */
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-position: 50% 50%; /* center 와 같은 의미 */
            background-size: cover;
        }
    </style>
</head>
<body>
    <h1>Background-Position</h1>
    <div class="bg"></div>
    <div class="star-bg"></div>
</body>
</html>
