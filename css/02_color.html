<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color</title>
    <meta name="description" content="CSS-Colors">
    <style>
        h2 {
            color: dodgerblue;
        }
        h3 {
            color: rgb(112, 199, 7);
        }
        h4 {
            color: rgba(30, 57, 50, 0.65); /* 투명도(alpha) = 0 ~ 1 */
        }
        h5 {
            color: #e1d4e8;
        }
    </style>
</head>
<body>
   <h1>CSS-Colors</h1> 
   <h2>Color-name</h2>
   <h3>Color-rgb</h3>
   <h4>Color-rgba</h4>
   <h5>Color-hexa</h5>
</body>
</html>
