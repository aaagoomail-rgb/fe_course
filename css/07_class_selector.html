<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector</title>
    <meta name="description" contenteditable="Class-Selector">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        .text_font {
            font-family: 'Open Sans', sans-serif;
            /* open sans 폰트와 기존 폰트간 'l' 자 비교 해 보면 차이 있음. */
        }
        .bg {
            background-color: aquamarine;
        }
        .text_color {
            color: tomato;
        }
        .button_bg {
            background-color: blueviolet;
        }
        .div1 {
            font-family: '맑은 고딕';
            font-size: 1.1em;
            font-weight: bold;
            background-color: cornsilk;
        }
    </style>
</head>
<body>
    <h1 class="text_font bg text_color">Class Selector 1</h1>
    <h1>Class Selector 2</h1>
    <h1 class="text_color">Class Selector 3</h1>
    <div class="div1">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo, earum harum doloremque dolorem dicta itaque tempora eius deserunt laudantium reiciendis reprehenderit? Amet, provident voluptas? Doloremque animi iusto porro beatae quas.
    </div>
    <div>
        <button class="button_bg text_color">회원가입</button>
        <button class="button_bg text_color">로그인</button>
    </div>
</body>
</html>
