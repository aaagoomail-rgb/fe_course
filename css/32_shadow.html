<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow <Style></Style></title>
    <style>
        .text {
            text-shadow: 10px 5px 0 rgb(97, 89, 89, 0.5);
        }
        .box {
            width: 500px;
            height: 300px;
            background-color: aquamarine;
            box-shadow: 46px 38px 36px -5px rgba(191,54,206,0.75);
            -webkit-box-shadow: 46px 38px 36px -5px rgba(191,54,206,0.75);
            -moz-box-shadow: 46px 38px 36px -5px rgba(191,54,206,0.75);
            /* shadow box 는 간편하게 웹 페이지에 'Box Shadow CSS Generator' 검색하여 사이트 들어가서 원하는 설정값 찾으면 된다. */
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Text-Shadow</h2>
</body>
</html>
