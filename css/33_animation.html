<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Style</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            border: 1px solid blue;
        }

        .box:hover {
            /* naem | duration | delay | direction */
            animation: changeColor 3s 0s 3; 
        }
        @keyframes changeColor {
            from {
                /* 애니메이션 시작 시 스타일 정의 */
                background-color: aquamarine;
            }
            /* 30% {} */
            50% { background-color: blueviolet;}
            /* 80% {} */
            to {
                /* 애니메이션 종료 시 스타일 정의 */
                background-color: crimson;
            }
        }
        .box-im {
            width: 100%;
            height: 500px;
            background-image: url('../images/pattern2.png');
            display: flex; /*가운데 정렬*/
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        img {
            width: 200px; height: 200px;
        }
        .img1, .img2, .img3, .img4, .img5 {
            opacity: 0;
            animation: fadeinup 5s ease forwards;
        }
        .img1 {
            animation-delay: 1s;
        }
        .img2 {
            animation-delay: 1.5s;
        }
        .img3 {
            animation-delay: 2s;
        }
        .img4 {
            animation-delay: 2.5s;
        }
        .img5 {
            animation-delay: 3s;
        }

        @keyframes fadeinup {
            from {
                opacity: 0;
                transform: translateX(-50px); /* +, - 로 방향 조절 */
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Animation Style</h1>
    <div class="box">box animation</div>
    <div class="box-im">
        <img src="../images/favicon_image.ico" alt="ico" class="img1">
        <img src="../images/favicon_image.ico" alt="ico" class="img2">
        <img src="../images/favicon_image.ico" alt="ico" class="img3">
        <img src="../images/favicon_image.ico" alt="ico" class="img4">
        <img src="../images/favicon_image.ico" alt="ico" class="img5">
    </div>
</body>
</html>
